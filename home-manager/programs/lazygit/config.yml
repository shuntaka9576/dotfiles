git:
  parseEmoji: true
  autoFetch: false

gui:
  showIcons: true
  screenMode: "normal"
  sidePanelWidth: 0.5

os:
  editPreset: "nvim"

customCommands:
  - key: "<c-g>"
    context: "files"
    description: "AI commit message (Claude haiku)"
    output: "terminal"
    command: "bash ~/dotfiles/home-manager/programs/lazygit/ai-commit.sh"
    loadingText: "Generating commit message with Claude..."
