name: nvfetcher

on:
  schedule:
    # 05:00 JST = 20:00 UTC (previous day)
    - cron: "0 20 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Run nvfetcher
        run: nix run github:berberman/nvfetcher -- -c nvfetcher.toml -o _sources

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(deps): update nvfetcher sources"
          title: "chore(deps): update nvfetcher sources"
          body: |
            Auto-generated by `.github/workflows/nvfetcher.yml`.

            Updates `_sources/generated.{nix,json}` based on `nvfetcher.toml`.
          branch: nvfetcher/update-sources
          delete-branch: true
          add-paths: |
            _sources/generated.nix
            _sources/generated.json
