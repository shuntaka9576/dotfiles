git:
  parseEmoji: true
  autoFetch: false

gui:
  showIcons: true
  screenMode: "normal"
  sidePanelWidth: 0.5

os:
  editPreset: "nvim"

customCommands:
  - key: "<c-g>"
    context: "files"
    description: "AI commit message (Claude haiku)"
    command: "nohup bash ~/dotfiles/home-manager/programs/lazygit/ai-commit.sh > /dev/null 2>&1 &"
    loadingText: "Generating commit message with Claude..."
